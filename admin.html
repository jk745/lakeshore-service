<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>備品管理後台 | Lakeshore Hotel</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;500&family=Noto+Sans+TC:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --gold: #C9A96E;
    --gold-light: #E8D5A3;
    --gold-dim: rgba(201,169,110,0.12);
    --deep: #111008;
    --surface: #16120D;
    --card: #1E1912;
    --card2: #252018;
    --border: rgba(255,255,255,0.06);
    --text: #F0EBE2;
    --text-dim: rgba(240,235,226,0.45);
    --danger: #D96B6B;
    --danger-dim: rgba(217,107,107,0.12);
    --success: #5BAD7B;
    --radius: 12px;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--deep);
    color: var(--text);
    font-family: 'Noto Sans TC', sans-serif;
    min-height: 100vh;
  }

  /* TOPBAR */
  .topbar {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 16px 32px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    position: sticky;
    top: 0;
    z-index: 50;
  }

  .topbar-left { display: flex; align-items: center; gap: 16px; }

  .logo {
    font-family: 'Noto Sans TC', sans-serif;
    font-size: 16px;
    color: var(--gold);
    letter-spacing: 0.05em;
  }

  .logo span { display: block; font-family: 'Noto Sans TC', sans-serif; font-size: 10px; color: var(--text-dim); letter-spacing: 0.15em; }

  .page-badge {
    background: var(--gold-dim);
    border: 1px solid rgba(201,169,110,0.25);
    color: var(--gold);
    font-size: 11px;
    padding: 4px 10px;
    border-radius: 20px;
    letter-spacing: 0.1em;
  }

  .save-status {
    font-size: 11px;
    color: var(--text-dim);
    letter-spacing: 0.05em;
  }

  .save-status.saved { color: var(--success); }

  /* LAYOUT */
  .layout {
    display: grid;
    grid-template-columns: 260px 1fr;
    min-height: calc(100vh - 61px);
  }

  /* SIDEBAR */
  .sidebar {
    background: var(--surface);
    border-right: 1px solid var(--border);
    padding: 20px 0;
    position: sticky;
    top: 61px;
    height: calc(100vh - 61px);
    overflow-y: auto;
  }

  .sidebar-title {
    font-size: 10px;
    letter-spacing: 0.2em;
    color: var(--text-dim);
    padding: 0 20px 10px;
    text-transform: uppercase;
  }

  .cat-item {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 10px 20px;
    cursor: pointer;
    transition: all 0.15s;
    border-left: 2px solid transparent;
  }

  .cat-item:hover { background: rgba(255,255,255,0.03); }
  .cat-item.active { background: var(--gold-dim); border-left-color: var(--gold); }

  .cat-item-icon { font-size: 18px; flex-shrink: 0; }
  .cat-item-name { font-size: 13px; flex: 1; }
  .cat-item-count { font-size: 11px; color: var(--text-dim); }
  .cat-item-toggle { font-size: 10px; opacity: 0.4; }

  .add-cat-btn {
    display: flex;
    align-items: center;
    gap: 8px;
    width: 100%;
    background: transparent;
    border: none;
    color: var(--gold);
    font-size: 12px;
    padding: 10px 20px;
    cursor: pointer;
    font-family: inherit;
    text-align: left;
    opacity: 0.7;
    transition: opacity 0.15s;
    margin-top: 8px;
    border-top: 1px solid var(--border);
  }

  .add-cat-btn:hover { opacity: 1; }

  /* MAIN */
  .main { padding: 28px 32px; }

  .section-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 20px;
  }

  .section-title {
    font-family: 'Noto Sans TC', sans-serif;
    font-size: 24px;
    color: var(--gold);
    font-weight: 400;
  }

  .section-sub {
    font-size: 12px;
    color: var(--text-dim);
    margin-top: 2px;
  }

  .btn {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    background: var(--gold-dim);
    border: 1px solid rgba(201,169,110,0.3);
    color: var(--gold);
    font-size: 12px;
    padding: 8px 16px;
    border-radius: 8px;
    cursor: pointer;
    font-family: inherit;
    transition: all 0.15s;
    letter-spacing: 0.03em;
  }

  .btn:hover { background: rgba(201,169,110,0.2); }

  .btn-danger {
    background: var(--danger-dim);
    border-color: rgba(217,107,107,0.3);
    color: var(--danger);
  }

  .btn-danger:hover { background: rgba(217,107,107,0.2); }

  /* CATEGORY EDIT CARD */
  .cat-edit-card {
    background: var(--card);
    border-radius: var(--radius);
    border: 1px solid var(--border);
    margin-bottom: 24px;
    overflow: hidden;
  }

  .cat-edit-header {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 16px 20px;
    border-bottom: 1px solid var(--border);
    background: var(--card2);
  }

  .field-group {
    display: flex;
    flex-direction: column;
    gap: 4px;
    flex: 1;
  }

  .field-group label {
    font-size: 10px;
    letter-spacing: 0.1em;
    color: var(--text-dim);
    text-transform: uppercase;
  }

  .field-row { display: flex; gap: 8px; }

  input[type="text"], input[type="number"] {
    background: rgba(255,255,255,0.05);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 7px 10px;
    color: var(--text);
    font-size: 13px;
    font-family: inherit;
    outline: none;
    transition: border-color 0.15s;
    width: 100%;
  }

  input[type="text"]:focus, input[type="number"]:focus {
    border-color: rgba(201,169,110,0.4);
  }

  .icon-input {
    width: 52px !important;
    text-align: center;
    font-size: 20px;
  }

  .toggle-switch {
    position: relative;
    width: 36px;
    height: 20px;
    flex-shrink: 0;
  }

  .toggle-switch input { display: none; }

  .toggle-track {
    position: absolute;
    inset: 0;
    background: rgba(255,255,255,0.1);
    border-radius: 10px;
    cursor: pointer;
    transition: background 0.2s;
  }

  .toggle-switch input:checked + .toggle-track { background: var(--success); }

  .toggle-track::after {
    content: '';
    position: absolute;
    top: 2px; left: 2px;
    width: 16px; height: 16px;
    border-radius: 50%;
    background: white;
    transition: transform 0.2s;
  }

  .toggle-switch input:checked + .toggle-track::after { transform: translateX(16px); }

  /* ITEMS TABLE */
  .items-table-wrap { padding: 16px 20px; }

  .items-table {
    width: 100%;
    border-collapse: collapse;
  }

  .items-table th {
    font-size: 10px;
    letter-spacing: 0.1em;
    color: var(--text-dim);
    text-align: left;
    padding: 0 8px 10px;
    text-transform: uppercase;
    border-bottom: 1px solid var(--border);
  }

  .items-table td {
    padding: 8px 8px;
    border-bottom: 1px solid rgba(255,255,255,0.03);
    vertical-align: middle;
  }

  .items-table tr:last-child td { border-bottom: none; }

  .items-table tr { transition: background 0.1s; }
  .items-table tbody tr:hover { background: rgba(255,255,255,0.02); }

  .drag-handle {
    color: var(--text-dim);
    cursor: grab;
    font-size: 14px;
    padding: 0 4px;
    user-select: none;
  }

  .del-item-btn {
    background: transparent;
    border: none;
    color: var(--danger);
    font-size: 14px;
    cursor: pointer;
    opacity: 0.6;
    transition: opacity 0.15s;
    padding: 4px;
  }

  .del-item-btn:hover { opacity: 1; }

  .add-item-row {
    display: flex;
    gap: 8px;
    margin-top: 12px;
    padding-top: 12px;
    border-top: 1px solid var(--border);
    flex-wrap: wrap;
  }

  .add-item-row input { flex: 1; min-width: 100px; }

  .add-item-btn {
    background: var(--gold-dim);
    border: 1px solid rgba(201,169,110,0.3);
    color: var(--gold);
    font-size: 13px;
    padding: 7px 14px;
    border-radius: 6px;
    cursor: pointer;
    font-family: inherit;
    transition: all 0.15s;
    white-space: nowrap;
  }

  .add-item-btn:hover { background: rgba(201,169,110,0.2); }

  /* EMPTY */
  .empty-main {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    height: 300px;
    color: var(--text-dim);
    text-align: center;
  }

  .empty-main .icon { font-size: 40px; margin-bottom: 12px; opacity: 0.3; }

  /* MODAL */
  .modal-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.7);
    z-index: 200;
    align-items: center;
    justify-content: center;
    backdrop-filter: blur(4px);
  }

  .modal-overlay.show { display: flex; }

  .modal {
    background: var(--card);
    border: 1px solid rgba(201,169,110,0.2);
    border-radius: 16px;
    padding: 28px;
    width: 360px;
    animation: modalIn 0.2s ease;
  }

  @keyframes modalIn { from { opacity:0; transform:scale(0.95); } to { opacity:1; transform:scale(1); } }

  .modal-title {
    font-family: 'Noto Sans TC', sans-serif;
    font-size: 20px;
    color: var(--gold);
    margin-bottom: 20px;
  }

  .modal-field { margin-bottom: 12px; }
  .modal-field label { display: block; font-size: 11px; color: var(--text-dim); margin-bottom: 5px; letter-spacing: 0.08em; }

  .modal-actions { display: flex; gap: 8px; margin-top: 20px; }

  .modal-btn {
    flex: 1;
    padding: 10px;
    border-radius: 8px;
    font-family: inherit;
    font-size: 13px;
    cursor: pointer;
    transition: all 0.15s;
  }

  .modal-btn-cancel { background: rgba(255,255,255,0.06); border: 1px solid var(--border); color: var(--text-dim); }
  .modal-btn-confirm { background: var(--gold-dim); border: 1px solid rgba(201,169,110,0.3); color: var(--gold); }

  .modal-btn-confirm:hover { background: rgba(201,169,110,0.2); }

  /* TOAST */
  .toast {
    position: fixed;
    bottom: 24px;
    right: 24px;
    background: var(--card2);
    border: 1px solid rgba(91,173,123,0.3);
    border-radius: 10px;
    padding: 12px 18px;
    font-size: 13px;
    color: var(--success);
    z-index: 300;
    animation: toastIn 0.3s ease;
  }

  @keyframes toastIn { from { opacity:0; transform:translateY(8px); } to { opacity:1; transform:translateY(0); } }

  /* CLEAN MODAL */
  .clean-modal-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.75);
    z-index: 400;
    align-items: center;
    justify-content: center;
    backdrop-filter: blur(4px);
  }
  .clean-modal-overlay.show { display: flex; }
  .clean-modal {
    background: var(--card);
    border: 1px solid rgba(217,107,107,0.25);
    border-radius: 16px;
    padding: 28px;
    width: 380px;
    max-width: 90vw;
    animation: modalIn 0.2s ease;
  }
  .clean-modal-title {
    font-family: 'Noto Sans TC', sans-serif;
    font-size: 20px;
    color: var(--danger);
    margin-bottom: 6px;
  }
  .clean-modal-sub {
    font-size: 12px;
    color: var(--text-dim);
    margin-bottom: 20px;
    line-height: 1.6;
  }
  .days-selector {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 8px;
    margin-bottom: 16px;
  }
  .days-btn {
    background: rgba(255,255,255,0.05);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 10px 0;
    font-size: 13px;
    color: var(--text-dim);
    cursor: pointer;
    font-family: inherit;
    text-align: center;
    transition: all 0.15s;
  }
  .days-btn:hover { background: rgba(217,107,107,0.08); color: var(--text); }
  .days-btn.selected {
    background: rgba(217,107,107,0.15);
    border-color: rgba(217,107,107,0.4);
    color: var(--danger);
  }
  .days-custom-row {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 16px;
  }
  .days-custom-row label { font-size: 12px; color: var(--text-dim); white-space: nowrap; }
  .days-custom-input {
    width: 80px;
    background: rgba(255,255,255,0.06);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 7px 10px;
    color: var(--text);
    font-size: 14px;
    font-family: 'Noto Sans TC', sans-serif;
    outline: none;
    text-align: center;
    transition: border-color 0.15s;
  }
  .days-custom-input:focus { border-color: rgba(217,107,107,0.4); }
  .clean-preview {
    background: rgba(217,107,107,0.06);
    border: 1px solid rgba(217,107,107,0.15);
    border-radius: 8px;
    padding: 12px 14px;
    font-size: 12px;
    color: var(--text-dim);
    margin-bottom: 18px;
    min-height: 40px;
    line-height: 1.7;
  }
  .clean-preview .count { color: var(--danger); font-weight: 500; font-size: 14px; }
  .clean-actions { display: flex; gap: 8px; }
  .clean-btn-cancel {
    flex: 1; padding: 11px; border-radius: 8px;
    background: rgba(255,255,255,0.05); border: 1px solid var(--border);
    color: var(--text-dim); font-family: inherit; font-size: 13px; cursor: pointer;
  }
  .clean-btn-confirm {
    flex: 2; padding: 11px; border-radius: 8px;
    background: rgba(217,107,107,0.15); border: 1px solid rgba(217,107,107,0.3);
    color: var(--danger); font-family: inherit; font-size: 13px; cursor: pointer;
    transition: background 0.15s;
  }
  .clean-btn-confirm:hover { background: rgba(217,107,107,0.25); }
  .clean-btn-confirm:disabled { opacity: 0.4; cursor: not-allowed; }

  /* TOPBAR 清除按鈕 */
  .clean-records-btn {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    background: var(--danger-dim);
    border: 1px solid rgba(217,107,107,0.3);
    color: var(--danger);
    font-size: 12px;
    padding: 7px 14px;
    border-radius: 8px;
    cursor: pointer;
    font-family: inherit;
    transition: all 0.15s;
    letter-spacing: 0.03em;
  }
  .clean-records-btn:hover { background: rgba(217,107,107,0.2); }
</style>
</head>
<body>

<div class="topbar">
  <div class="topbar-left">
    <div class="logo">
      Lakeshore Hotel Hualien Taroko
      <span>煙波花蓮太魯閣</span>
    </div>
    <div class="page-badge">備品管理後台</div>
  </div>
  <div style="display:flex;align-items:center;gap:12px">
    <button class="clean-records-btn" onclick="openCleanModal()">🗑 清除舊記錄</button>
    <div class="save-status" id="saveStatus">所有變更即時儲存</div>
  </div>
</div>

<div class="layout">
  <div class="sidebar">
    <div class="sidebar-title">服務分類</div>
    <div id="catList"></div>
    <button class="add-cat-btn" onclick="openAddCatModal()">＋ 新增分類</button>
  </div>

  <div class="main" id="mainContent">
    <div class="empty-main">
      <div class="icon">📋</div>
      <div>請從左側選擇一個分類進行編輯</div>
    </div>
  </div>
</div>

<!-- Clean Records Modal -->
<div class="clean-modal-overlay" id="cleanModal">
  <div class="clean-modal">
    <div class="clean-modal-title">🗑 清除舊記錄</div>
    <div class="clean-modal-sub">
      將刪除指定時間以前、狀態為「已完成」的服務單。<br>
      <strong style="color:var(--danger)">此操作無法還原</strong>，建議清除前先下載記錄備份。
    </div>

    <div class="days-selector">
      <button class="days-btn" onclick="selectHours(3)">3 小時前</button>
      <button class="days-btn" onclick="selectHours(6)">6 小時前</button>
      <button class="days-btn" onclick="selectHours(12)">12 小時前</button>
      <button class="days-btn" onclick="selectHours(24)">24 小時前</button>
      <button class="days-btn" onclick="selectDays(7)">7 天前</button>
      <button class="days-btn" onclick="selectDays(14)">14 天前</button>
      <button class="days-btn selected" onclick="selectDays(30)">30 天前</button>
      <button class="days-btn" onclick="selectDays(60)">60 天前</button>
    </div>

    <div class="days-custom-row" style="flex-wrap:wrap;gap:8px">
      <label style="white-space:nowrap">自訂：</label>
      <input type="number" class="days-custom-input" id="customHoursInput"
        min="1" max="720" placeholder="小時數"
        oninput="onCustomHoursInput(this.value)" style="width:90px">
      <span style="font-size:12px;color:var(--text-dim)">小時前</span>
      <span style="font-size:12px;color:rgba(255,255,255,0.15)">或</span>
      <input type="number" class="days-custom-input" id="customDaysInput"
        min="1" max="365" placeholder="天數"
        oninput="onCustomDaysInput(this.value)" style="width:90px">
      <span style="font-size:12px;color:var(--text-dim)">天前</span>
    </div>

    <div class="clean-preview" id="cleanPreview">
      正在計算…
    </div>

    <div class="clean-actions">
      <button class="clean-btn-cancel" onclick="closeCleanModal()">取消</button>
      <button class="clean-btn-confirm" id="cleanConfirmBtn" onclick="doCleanRecords()" disabled>
        確認清除
      </button>
    </div>
  </div>
</div>

<!-- Add Category Modal -->
<div class="modal-overlay" id="addCatModal">
  <div class="modal">
    <div class="modal-title">新增服務分類</div>
    <div class="modal-field">
      <label>分類圖示（Emoji）</label>
      <input type="text" id="newCatIcon" placeholder="🛏" class="icon-input" maxlength="2">
    </div>
    <div class="modal-field">
      <label>中文名稱</label>
      <input type="text" id="newCatNameZh" placeholder="例：寢具備品">
    </div>
    <div class="modal-field">
      <label>英文名稱 English</label>
      <input type="text" id="newCatNameEn" placeholder="e.g. Bedding">
    </div>
    <div class="modal-field">
      <label>日文名稱 日本語</label>
      <input type="text" id="newCatNameJa" placeholder="例：寝具">
    </div>
    <div class="modal-actions">
      <button class="modal-btn modal-btn-cancel" onclick="closeModal('addCatModal')">取消</button>
      <button class="modal-btn modal-btn-confirm" onclick="addCategory()">新增分類</button>
    </div>
  </div>
</div>

<!-- Firebase -->
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getDatabase, ref, onValue, set, update, remove, push, get } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

const firebaseConfig = {
  apiKey: "AIzaSyCFDq7PjC5j--bnHJ9SBglao4_avOCEge8",
  authDomain: "lakeshore-guest-service.firebaseapp.com",
  databaseURL: "https://lakeshore-guest-service-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId: "lakeshore-guest-service",
  storageBucket: "lakeshore-guest-service.firebasestorage.app",
  messagingSenderId: "1026886642744",
  appId: "1:1026886642744:web:225dccc902e0a7d9e00acd"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

let categories = {};
let selectedCatId = null;

// ── Load ───────────────────────────────────────────────
onValue(ref(db, 'categories'), (snap) => {
  categories = snap.exists() ? snap.val() : {};
  renderSidebar();
  if (selectedCatId && categories[selectedCatId]) renderCatEditor(selectedCatId);
});

// ── Sidebar ────────────────────────────────────────────
function renderSidebar() {
  const el = document.getElementById('catList');
  const sorted = Object.entries(categories).sort((a, b) => (a[1].order || 0) - (b[1].order || 0));
  el.innerHTML = sorted.map(([id, cat]) => {
    const itemCount = cat.items ? Object.keys(cat.items).length : 0;
    const inactive = cat.active === false ? '⚫' : '';
    return `<div class="cat-item ${selectedCatId === id ? 'active' : ''}" onclick="selectCat('${id}')">
      <span class="cat-item-icon">${cat.icon || '📦'}</span>
      <span class="cat-item-name">${cat.nameZh}</span>
      <span class="cat-item-count">${itemCount} 項 ${inactive}</span>
    </div>`;
  }).join('');
}

window.selectCat = function(id) {
  selectedCatId = id;
  renderSidebar();
  renderCatEditor(id);
};

// ── Category Editor ────────────────────────────────────
function renderCatEditor(catId) {
  const cat = categories[catId];
  if (!cat) return;

  const items = cat.items ? Object.entries(cat.items) : [];
  const isActive = cat.active !== false;

  document.getElementById('mainContent').innerHTML = `
    <div class="section-header">
      <div>
        <div class="section-title">${cat.icon || '📦'} ${cat.nameZh}</div>
        <div class="section-sub">編輯此分類的名稱、圖示及備品項目</div>
      </div>
      <button class="btn btn-danger" onclick="deleteCategory('${catId}')">🗑 刪除此分類</button>
    </div>

    <!-- Category Basic Info -->
    <div class="cat-edit-card">
      <div class="cat-edit-header">
        <div class="field-group">
          <label>分類圖示</label>
          <input type="text" class="icon-input" id="catIcon" value="${cat.icon || ''}" maxlength="2"
            oninput="updateCatField('${catId}', 'icon', this.value)" placeholder="📦">
        </div>
        <div class="field-group" style="flex:2">
          <label>中文名稱</label>
          <input type="text" id="catNameZh" value="${cat.nameZh || ''}"
            oninput="updateCatField('${catId}', 'nameZh', this.value)" placeholder="分類名稱">
        </div>
        <div class="field-group" style="flex:2">
          <label>English</label>
          <input type="text" id="catNameEn" value="${cat.nameEn || ''}"
            oninput="updateCatField('${catId}', 'nameEn', this.value)" placeholder="Category Name">
        </div>
        <div class="field-group" style="flex:2">
          <label>日本語</label>
          <input type="text" id="catNameJa" value="${cat.nameJa || ''}"
            oninput="updateCatField('${catId}', 'nameJa', this.value)" placeholder="カテゴリ名">
        </div>
        <div class="field-group" style="align-items:center">
          <label>顯示</label>
          <label class="toggle-switch">
            <input type="checkbox" ${isActive ? 'checked' : ''}
              onchange="updateCatField('${catId}', 'active', this.checked)">
            <div class="toggle-track"></div>
          </label>
        </div>
      </div>

      <!-- Items Table -->
      <div class="items-table-wrap">
        <table class="items-table">
          <thead>
            <tr>
              <th style="width:30px"></th>
              <th style="width:50px">圖示</th>
              <th>中文名稱</th>
              <th>English</th>
              <th>日本語</th>
              <th style="width:40px"></th>
            </tr>
          </thead>
          <tbody id="itemsBody">
            ${items.map(([itemId, item]) => renderItemRow(catId, itemId, item)).join('')}
          </tbody>
        </table>

        <div class="add-item-row">
          <input type="text" id="newItemIcon" placeholder="🧴" class="icon-input" maxlength="2" style="width:52px;flex:none">
          <input type="text" id="newItemZh" placeholder="備品名稱（中文）">
          <input type="text" id="newItemEn" placeholder="Item Name (EN)">
          <input type="text" id="newItemJa" placeholder="アイテム名（日本語）">
          <button class="add-item-btn" onclick="addItem('${catId}')">＋ 新增備品</button>
        </div>
      </div>
    </div>
  `;
}

function renderItemRow(catId, itemId, item) {
  return `<tr id="row_${catId}_${itemId}">
    <td><span class="drag-handle">⋮⋮</span></td>
    <td><input type="text" class="icon-input" value="${item.icon || ''}" maxlength="2"
      oninput="updateItemField('${catId}','${itemId}','icon',this.value)" style="width:44px"></td>
    <td><input type="text" value="${item.nameZh || ''}"
      oninput="updateItemField('${catId}','${itemId}','nameZh',this.value)"></td>
    <td><input type="text" value="${item.nameEn || ''}"
      oninput="updateItemField('${catId}','${itemId}','nameEn',this.value)"></td>
    <td><input type="text" value="${item.nameJa || ''}"
      oninput="updateItemField('${catId}','${itemId}','nameJa',this.value)"></td>
    <td><button class="del-item-btn" onclick="deleteItem('${catId}','${itemId}')">✕</button></td>
  </tr>`;
}

// ── Debounced Save ─────────────────────────────────────
let saveTimers = {};

function debouncedSave(path, value, delay = 600) {
  clearTimeout(saveTimers[path]);
  document.getElementById('saveStatus').textContent = '儲存中…';
  document.getElementById('saveStatus').className = 'save-status';
  saveTimers[path] = setTimeout(() => {
    set(ref(db, path), value).then(() => {
      document.getElementById('saveStatus').textContent = '✓ 已儲存';
      document.getElementById('saveStatus').className = 'save-status saved';
      setTimeout(() => {
        document.getElementById('saveStatus').textContent = '所有變更即時儲存';
        document.getElementById('saveStatus').className = 'save-status';
      }, 2000);
    });
  }, delay);
}

window.updateCatField = function(catId, field, value) {
  debouncedSave(`categories/${catId}/${field}`, value);
};

window.updateItemField = function(catId, itemId, field, value) {
  debouncedSave(`categories/${catId}/items/${itemId}/${field}`, value);
};

// ── Add Item ───────────────────────────────────────────
window.addItem = function(catId) {
  const icon = document.getElementById('newItemIcon').value.trim() || '📦';
  const nameZh = document.getElementById('newItemZh').value.trim();
  const nameEn = document.getElementById('newItemEn').value.trim();
  const nameJa = document.getElementById('newItemJa').value.trim();
  if (!nameZh) { alert('請輸入中文名稱'); return; }
  const itemId = 'item_' + Date.now();
  set(ref(db, `categories/${catId}/items/${itemId}`), { icon, nameZh, nameEn, nameJa });
  ['newItemIcon','newItemZh','newItemEn','newItemJa'].forEach(id => document.getElementById(id).value = '');
  showToast('備品已新增');
};

// ── Delete Item ────────────────────────────────────────
window.deleteItem = function(catId, itemId) {
  if (!confirm('確定要刪除此備品項目？')) return;
  remove(ref(db, `categories/${catId}/items/${itemId}`));
  showToast('備品已刪除');
};

// ── Delete Category ────────────────────────────────────
window.deleteCategory = function(catId) {
  if (!confirm('確定要刪除此分類及其所有備品？此操作無法還原。')) return;
  remove(ref(db, `categories/${catId}`));
  selectedCatId = null;
  document.getElementById('mainContent').innerHTML = `<div class="empty-main"><div class="icon">📋</div><div>請從左側選擇一個分類進行編輯</div></div>`;
  showToast('分類已刪除');
};

// ── Add Category ───────────────────────────────────────
window.openAddCatModal = function() {
  document.getElementById('addCatModal').classList.add('show');
};

window.closeModal = function(id) {
  document.getElementById(id).classList.remove('show');
};

window.addCategory = function() {
  const icon = document.getElementById('newCatIcon').value.trim() || '📦';
  const nameZh = document.getElementById('newCatNameZh').value.trim();
  const nameEn = document.getElementById('newCatNameEn').value.trim();
  const nameJa = document.getElementById('newCatNameJa').value.trim();
  if (!nameZh) { alert('請輸入中文名稱'); return; }

  const catId = 'cat_' + Date.now();
  const order = Object.keys(categories).length;

  // ⚠️ Firebase 不允許儲存空物件，items 欄位省略，等新增備品時自動建立
  set(ref(db, `categories/${catId}`), { icon, nameZh, nameEn, nameJa, active: true, order })
    .then(() => {
      closeModal('addCatModal');
      ['newCatIcon','newCatNameZh','newCatNameEn','newCatNameJa'].forEach(id => document.getElementById(id).value = '');
      showToast('分類已新增');
    })
    .catch(err => {
      alert('新增失敗，請確認 Firebase 連線正常：' + err.message);
    });
};

// ── Toast ──────────────────────────────────────────────
function showToast(msg) {
  const el = document.createElement('div');
  el.className = 'toast';
  el.textContent = '✓ ' + msg;
  document.body.appendChild(el);
  setTimeout(() => el.remove(), 2500);
}

// ── Clean Records ───────────────────────────────────────
let cleanHours = 720; // 預設 30 天 = 720 小時
let cleanTargetKeys = [];

function hoursToLabel(h) {
  if (h < 24) return `${h} 小時前`;
  const d = Math.floor(h / 24);
  const rem = h % 24;
  return rem > 0 ? `${d} 天 ${rem} 小時前` : `${d} 天前`;
}

window.openCleanModal = function() {
  cleanHours = 720;
  document.getElementById('customDaysInput').value = '';
  document.getElementById('customHoursInput').value = '';
  document.querySelectorAll('.days-btn').forEach(b => {
    b.classList.toggle('selected', b.textContent.includes('30 天'));
  });
  calcCleanPreview();
  document.getElementById('cleanModal').classList.add('show');
};

window.closeCleanModal = function() {
  document.getElementById('cleanModal').classList.remove('show');
};

window.selectHours = function(hours) {
  cleanHours = hours;
  document.getElementById('customDaysInput').value = '';
  document.getElementById('customHoursInput').value = '';
  document.querySelectorAll('.days-btn').forEach(b => {
    b.classList.toggle('selected', b.textContent === hours + ' 小時前');
  });
  calcCleanPreview();
};

window.selectDays = function(days) {
  cleanHours = days * 24;
  document.getElementById('customDaysInput').value = '';
  document.getElementById('customHoursInput').value = '';
  document.querySelectorAll('.days-btn').forEach(b => {
    b.classList.toggle('selected', b.textContent === days + ' 天前');
  });
  calcCleanPreview();
};

window.onCustomHoursInput = function(val) {
  const n = parseInt(val);
  if (!isNaN(n) && n > 0) {
    cleanHours = n;
    document.getElementById('customDaysInput').value = '';
    document.querySelectorAll('.days-btn').forEach(b => b.classList.remove('selected'));
    calcCleanPreview();
  }
};

window.onCustomDaysInput = function(val) {
  const n = parseInt(val);
  if (!isNaN(n) && n > 0) {
    cleanHours = n * 24;
    document.getElementById('customHoursInput').value = '';
    document.querySelectorAll('.days-btn').forEach(b => b.classList.remove('selected'));
    calcCleanPreview();
  }
};

function calcCleanPreview() {
  const cutoff = Date.now() - cleanHours * 60 * 60 * 1000;
  const preview = document.getElementById('cleanPreview');
  const confirmBtn = document.getElementById('cleanConfirmBtn');

  get(ref(db, 'requests')).then(snap => {
    if (!snap.exists()) {
      cleanTargetKeys = [];
      preview.innerHTML = '目前沒有任何服務記錄。';
      confirmBtn.disabled = true;
      return;
    }
    const all = snap.val();
    cleanTargetKeys = Object.entries(all)
      .filter(([, r]) => r.status === 'done' && r.createdAt < cutoff)
      .map(([k]) => k);

    const cutoffTime = new Date(cutoff).toLocaleString('zh-TW', { month:'numeric', day:'numeric', hour:'2-digit', minute:'2-digit', hour12:false });
    const label = hoursToLabel(cleanHours);

    if (cleanTargetKeys.length === 0) {
      preview.innerHTML = `${label}（${cutoffTime}）以前沒有已完成的記錄可清除。`;
      confirmBtn.disabled = true;
    } else {
      preview.innerHTML = `將清除 <span class="count">${cleanTargetKeys.length} 筆</span> 已完成記錄<br>（${label}，即 ${cutoffTime} 以前）`;
      confirmBtn.disabled = false;
      confirmBtn.textContent = `確認清除 ${cleanTargetKeys.length} 筆`;
    }
  }).catch(() => {
    preview.innerHTML = '無法讀取記錄，請確認 Firebase 連線。';
    confirmBtn.disabled = true;
  });
}

window.doCleanRecords = function() {
  if (!cleanTargetKeys.length) return;
  const label = hoursToLabel(cleanHours);
  if (!confirm(`確定要永久刪除 ${cleanTargetKeys.length} 筆已完成記錄（${label}以前）？\n此操作無法還原。`)) return;

  const confirmBtn = document.getElementById('cleanConfirmBtn');
  confirmBtn.disabled = true;
  confirmBtn.textContent = '刪除中…';

  const promises = cleanTargetKeys.map(key => remove(ref(db, 'requests/' + key)));

  Promise.all(promises)
    .then(() => {
      closeCleanModal();
      showToast('已清除 ' + cleanTargetKeys.length + ' 筆舊記錄');
      cleanTargetKeys = [];
    })
    .catch(err => {
      alert('清除失敗：' + err.message);
      confirmBtn.disabled = false;
      confirmBtn.textContent = '確認清除';
    });
};
</script>
